<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr Ink Well's — Email Checker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #0e0e0e; --paper: #f5f0e8; --paper2: #ede8df;
    --good: #1a7a3c; --warn: #b56a00; --bad: #c8371a;
    --sans: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace; --display: 'Bebas Neue', sans-serif;
  }
  body { background: var(--paper); color: var(--ink); font-family: var(--sans); min-height: 100vh; }
  header { background: var(--ink); color: var(--paper); padding: 1.5rem 2rem; display: flex; align-items: baseline; gap: 1rem; }
  header h1 { font-family: var(--display); font-size: 2.6rem; letter-spacing: 0.05em; line-height: 1; }
  header span { font-family: var(--mono); font-size: 0.75rem; color: #999; text-transform: uppercase; letter-spacing: 0.1em; }

  main { max-width: 680px; margin: 0 auto; padding: 2rem; display: flex; flex-direction: column; gap: 1.25rem; }
  .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; border: 1.5px solid var(--ink); border-radius: 2px; overflow: hidden; }
  .stat { padding: 0.75rem 1rem; text-align: center; border-right: 1px solid var(--ink); }
  .stat:last-child { border-right: none; }
  .stat-val { font-family: var(--display); font-size: 2rem; line-height: 1; display: block; }
  .stat-val.good { color: var(--good); } .stat-val.bad { color: var(--bad); }
  .stat-label { font-family: var(--mono); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: #666; margin-top: 2px; display: block; }
  label.field { font-family: var(--mono); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: #555; display: block; margin-bottom: 6px; }
  textarea { width: 100%; font-family: var(--sans); font-size: 0.9rem; line-height: 1.65; padding: 12px 14px; border: 1.5px solid var(--ink); background: var(--paper); color: var(--ink); resize: vertical; min-height: 200px; outline: none; border-radius: 2px; }
  textarea:focus { border-color: #1a6bc8; }
  textarea::placeholder { color: #aaa; }
  #analyse-btn { width: 100%; padding: 14px; font-family: var(--display); font-size: 1.4rem; letter-spacing: 0.1em; background: var(--ink); color: var(--paper); border: none; cursor: pointer; border-radius: 2px; transition: background 0.15s; display: flex; align-items: center; justify-content: center; gap: 10px; }
  #analyse-btn:hover { background: #2a2a2a; }
  #analyse-btn:disabled { background: #888; cursor: not-allowed; }
  #result { display: none; border: 2px solid var(--ink); border-radius: 2px; overflow: hidden; animation: fadeUp 0.2s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .result-header { padding: 1.25rem 1.5rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
  .result-header.good { background: #d4f0de; border-bottom: 1.5px solid var(--good); }
  .result-header.warn { background: #fdf0d0; border-bottom: 1.5px solid var(--warn); }
  .result-header.bad  { background: #fde0db; border-bottom: 1.5px solid var(--bad); }
  .result-label { font-family: var(--mono); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 4px; }
  .result-label.good { color: var(--good); } .result-label.warn { color: var(--warn); } .result-label.bad { color: var(--bad); }
  .result-headline { font-family: var(--display); font-size: 1.5rem; letter-spacing: 0.03em; line-height: 1.1; }
  .conf-pill { font-family: var(--mono); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; padding: 4px 10px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
  .conf-high { background: var(--good); color: white; } .conf-medium { background: var(--warn); color: white; } .conf-low { background: #888; color: white; }
  .result-body { padding: 1.25rem 1.5rem; background: white; display: flex; flex-direction: column; gap: 1rem; }
  .result-summary { font-size: 0.9rem; line-height: 1.7; color: #333; }
  .signals-title { font-family: var(--mono); font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em; color: #888; margin-bottom: 8px; }
  .signal { display: flex; gap: 8px; font-size: 0.85rem; line-height: 1.5; color: #444; margin-bottom: 6px; }
  .signal::before { content: '—'; color: #aaa; flex-shrink: 0; font-family: var(--mono); }
  #key-bar { background: var(--paper2); border-bottom: 1.5px solid var(--ink); padding: 0.7rem 2rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
  #key-bar label { font-family: var(--mono); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; white-space: nowrap; }
  #api-key-input { flex: 1; min-width: 200px; font-family: var(--mono); font-size: 0.8rem; padding: 6px 10px; border: 1.5px solid var(--ink); background: var(--paper); color: var(--ink); outline: none; border-radius: 2px; }
  #api-key-input:focus { border-color: #1a6bc8; }
  #key-status { font-family: var(--mono); font-size: 0.7rem; color: #666; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 18px; height: 18px; border: 2px solid rgba(245,240,232,0.3); border-top-color: var(--paper); border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
  @media (max-width: 600px) { header { padding: 1rem; } header h1 { font-size: 2rem; } #key-bar { padding: 0.7rem 1rem; } main { padding: 1rem; } }
</style>
</head>
<body>

<header>
  <h1>Dr Ink Well's</h1>
  <span>Custom Tattoo — Email Checker</span>
</header>



<div id="key-bar">
  <label for="api-key-input">API Key</label>
  <input type="password" id="api-key-input" placeholder="sk-ant-..." autocomplete="off" />
  <span id="key-status">Enter your key to get started</span>
</div>
<main>
    <div class="stat"><span class="stat-val" id="stat-total">0</span><span class="stat-label">Checked</span></div>
    <div class="stat"><span class="stat-val good" id="stat-leads">0</span><span class="stat-label">Real leads</span></div>
    <div class="stat"><span class="stat-val bad" id="stat-spam">0</span><span class="stat-label">Spam</span></div>
  </div>

  <div>
    <label class="field" for="email-input">Paste email here</label>
    <textarea id="email-input" placeholder="Paste the full email — subject, sender, and body..."></textarea>
  </div>

  <button id="analyse-btn" onclick="analyseEmail()">Check email</button>

  <div id="result">
    <div class="result-header" id="result-header">
      <div>
        <div class="result-label" id="result-label"></div>
        <div class="result-headline" id="result-headline"></div>
      </div>
      <span class="conf-pill" id="conf-pill"></span>
    </div>
    <div class="result-body">
      <p class="result-summary" id="result-summary"></p>
      <div>
        <div class="signals-title">Why</div>
        <div id="signals-list"></div>
      </div>
    </div>
  </div>
</main>

<script>
  let stats = { total: 0, leads: 0, spam: 0 };

  document.getElementById('api-key-input').addEventListener('input', function() {
    const v = this.value.trim(), s = document.getElementById('key-status');
    if (v.startsWith('sk-ant-') && v.length > 20) { s.textContent = '✓ Ready'; s.style.color = '#1a7a3c'; }
    else if (v.length > 0) { s.textContent = 'Key looks incomplete'; s.style.color = '#b56a00'; }
    else { s.textContent = 'Enter your key to get started'; s.style.color = '#666'; }
  });

  async function analyseEmail() {
    const email = document.getElementById('email-input').value.trim();
    const apiKey = document.getElementById('api-key-input').value.trim();
    if (!email) { alert('Paste an email first.'); return; }
    if (!apiKey) { alert('Enter your Anthropic API key first.'); return; }

    const btn = document.getElementById('analyse-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Checking...';
    document.getElementById('result').style.display = 'none';

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-3-5-haiku-20241022',
          max_tokens: 600,
          messages: [{
            role: 'user',
            content: `You are a spam filter for a tattoo shop. Analyse this email. Reply ONLY with a JSON object — no markdown, no backticks.

Email:
${email}

Return exactly:
{
  "verdict": "real_lead" | "spam" | "review",
  "confidence": "high" | "medium" | "low",
  "headline": "One short sentence saying what this email is",
  "summary": "2 sentences explaining your verdict",
  "signals": ["2-4 short reasons for your verdict"]
}

real_lead = genuine booking, tattoo enquiry, collab, supplier, press
spam = SEO, cold sales, link building, unrelated marketing
review = genuinely unclear`
          }]
        })
      });

      if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || 'API error'); }
      const data = await res.json();
      const r = JSON.parse(data.content.map(i => i.text || '').join('').replace(/```json|```/g, '').trim());

      showResult(r);
      stats.total++;
      if (r.verdict === 'real_lead') stats.leads++;
      if (r.verdict === 'spam') stats.spam++;
      document.getElementById('stat-total').textContent = stats.total;
      document.getElementById('stat-leads').textContent = stats.leads;
      document.getElementById('stat-spam').textContent = stats.spam;

    } catch (err) { alert('Error: ' + err.message); }

    btn.disabled = false;
    btn.innerHTML = 'Check email';
  }

  function showResult(r) {
    const cfg = {
      real_lead: { cls: 'good', label: '✓ Real opportunity' },
      spam:      { cls: 'bad',  label: '✕ Likely spam' },
      review:    { cls: 'warn', label: '? Needs a look' }
    };
    const c = cfg[r.verdict] || cfg.review;
    document.getElementById('result-header').className = 'result-header ' + c.cls;
    document.getElementById('result-label').className = 'result-label ' + c.cls;
    document.getElementById('result-label').textContent = c.label;
    document.getElementById('result-headline').textContent = r.headline;
    const pill = document.getElementById('conf-pill');
    pill.textContent = r.confidence + ' confidence';
    pill.className = 'conf-pill conf-' + r.confidence;
    document.getElementById('result-summary').textContent = r.summary;
    document.getElementById('signals-list').innerHTML = (r.signals || []).map(s => `<div class="signal">${s}</div>`).join('');
    document.getElementById('result').style.display = 'block';
  }
</script>
</body>
</html>
